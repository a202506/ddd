name: Build APK

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Generate wrapper if missing
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 8.7 --no-daemon
            chmod +x gradlew
          fi

      - name: Decode keystore (if present)
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "path=$RUNNER_TEMP/release.jks" >> "$GITHUB_OUTPUT"
            echo "Keystore decoded"
          else
            echo "path=" >> "$GITHUB_OUTPUT"
            echo "No KEYSTORE_BASE64 secret — release APK will be signed with the debug keystore"
          fi

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Build release APK (signed if secrets present)
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          VERSION_NAME: 0.1.0-ci${{ github.run_number }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: dingclock-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: dingclock-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
